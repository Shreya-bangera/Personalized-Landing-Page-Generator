<!-- Deployed via GitHub Pages: serve this static client demo -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Troopod AI PM — Client Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <h1>Personalized Landing Page — Client-only Demo</h1>
    <p>This static demo runs entirely in the browser (no server, no credit card). It uses the fallback generator (no OpenAI).</p>
    <form id="genForm">
      <label>Landing page URL
        <input name="landingUrl" id="landingUrl" placeholder="https://example.com/offer" required />
      </label>
      <label>Ad creative URL (optional)
        <input name="adUrl" id="adUrl" placeholder="https://.../ad.jpg" />
      </label>
      <label>Or upload ad creative (image)
        <input type="file" id="adFile" accept="image/*" />
      </label>
      <input type="hidden" id="dominantColor" />
      <label>Persona (optional)
        <input id="persona" placeholder="e.g., 'Young urban professional'" />
      </label>
      <div style="display:flex;gap:8px;align-items:center">
        <button type="submit">Generate & Open</button>
        <button id="downloadBtn" type="button">Download HTML</button>
      </div>
    </form>

    <div id="note" style="margin-top:12px;color:#555"></div>
  </main>

  <script src="main.js"></script>
</body>
</html>
